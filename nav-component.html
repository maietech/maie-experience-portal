<!--
  maie-nav.html — Global MAIE navigation component

  HOW TO USE
  Paste the <style> block into the host page's <head> (or its own
  <style>), and the <nav> markup as the first child of <body>. Works as
  a drop-in for dashboard/index.html and pitch/index.html.

  Do NOT paste this into pixie/index.html or pixie-framework/index.html.
  Those two are embed-only component fragments (no page chrome of their
  own by design — see the EMBED_MODE pattern used in experience-module),
  not top-level pages that should own a nav bar.

  TOKENS
  Locked to its own --mnav-* values rather than chaining to a host
  token set, the same call already made in pixie/index.html and
  pixie-framework/index.html: there's no single real global.css across
  this codebase to chain to (dashboard uses --du-*, pitch uses
  unprefixed --primary/--bg/etc with a different accent, root
  index.html uses another unprefixed set). The color values below are
  the ones dashboard and root index.html already agree on byte-for-byte
  (#100c0b / #8a2e22 / #d6a13c), so the nav reads as the same system on
  every page it's dropped into without requiring a token migration
  across four files first.

  ACTIVE STATE
  Set data-nav="dashboard|experience|companion|pitch|framework" on
  <body> in the host page; the script below reads it to mark the
  matching link. If omitted, no link is marked active.
-->
<style>
  :root {
    --mnav-bg:      rgba(16, 12, 11, 0.72);
    --mnav-border:  rgba(255,255,255,0.08);
    --mnav-text:    #f0e9e4;
    --mnav-muted:   #9a8f88;
    --mnav-brand:   #8a2e22;
    --mnav-brand-light: #c24e4e;
    --mnav-amber:   #d6a13c;
    --mnav-font:    'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mnav-height:  60px;
  }

  .mnav {
    position: sticky;
    top: 0;
    z-index: 1000;
    height: var(--mnav-height);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(16px, 3vw, 40px);
    background: var(--mnav-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--mnav-border);
    font-family: var(--mnav-font);
  }

  .mnav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--mnav-text);
    flex-shrink: 0;
  }
  .mnav-brand svg { display: block; }
  .mnav-brand-word {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .mnav-links {
    display: flex;
    align-items: center;
    gap: clamp(4px, 1.5vw, 8px);
  }
  .mnav-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--mnav-muted);
    text-decoration: none;
    white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .mnav-link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.8; }
  .mnav-link:hover { color: var(--mnav-text); background: rgba(255,255,255,0.05); }
  .mnav-link.active {
    color: var(--mnav-text);
    background: rgba(138,46,34,0.18);
    box-shadow: inset 0 0 0 1px rgba(194,78,78,0.35);
  }
  .mnav-link.active svg { opacity: 1; color: var(--mnav-brand-light); }

  .mnav-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .mnav-context {
    font-size: 12px;
    color: var(--mnav-muted);
    padding: 5px 10px;
    border: 1px solid var(--mnav-border);
    border-radius: 999px;
  }

  .mnav-toggle {
    display: none;
    background: none;
    border: 1px solid var(--mnav-border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
    color: var(--mnav-text);
    cursor: pointer;
  }

  .mnav-overlay {
    display: none;
    position: fixed;
    inset: var(--mnav-height) 0 0 0;
    z-index: 999;
    background: #0b0908;
    padding: 24px clamp(16px, 6vw, 40px);
  }
  .mnav-overlay.open { display: flex; flex-direction: column; gap: 4px; }
  .mnav-overlay .mnav-link { font-size: 16px; padding: 14px 12px; }

  @media (max-width: 720px) {
    .mnav-links { display: none; }
    .mnav-toggle { display: flex; }
    .mnav-context { display: none; }
  }
</style>

<nav class="mnav" aria-label="MAIE global navigation">
  <a class="mnav-brand" href="/index.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="22" height="22" rx="6" stroke="var(--mnav-brand-light)" stroke-width="1.5"/>
      <path d="M7 16V8l5 5 5-5v8" stroke="var(--mnav-amber)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="mnav-brand-word">MAIE</span>
  </a>

  <div class="mnav-links" id="mnav-links">
    <a class="mnav-link" data-nav="dashboard" href="/dashboard/index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Dashboard
    </a>
    <a class="mnav-link" data-nav="experience" href="/pixie/index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3"/></svg>
      Experience
    </a>
    <a class="mnav-link" data-nav="companion" href="/pixie-framework/index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 21s-7-4.4-9.5-9A5.5 5.5 0 0 1 12 6.5 5.5 5.5 0 0 1 21.5 12c-2.5 4.6-9.5 9-9.5 9Z"/></svg>
      Companion
    </a>
    <a class="mnav-link" data-nav="pitch" href="/pitch/index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19V5a2 2 0 0 1 2-2h8l6 6v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M14 3v6h6"/></svg>
      Pitch
    </a>
  </div>

  <div class="mnav-right">
    <span class="mnav-context" id="mnav-context"></span>
    <button class="mnav-toggle" id="mnav-toggle" aria-label="Open menu" aria-expanded="false">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>
</nav>

<div class="mnav-overlay" id="mnav-overlay"></div>

<script>
(function () {
  var current = document.body.getAttribute('data-nav');
  document.querySelectorAll('.mnav-link[data-nav]').forEach(function (el) {
    if (current && el.getAttribute('data-nav') === current) {
      el.classList.add('active');
      var label = el.textContent.trim();
      var ctx = document.getElementById('mnav-context');
      if (ctx) ctx.textContent = label;
    }
  });

  var toggle = document.getElementById('mnav-toggle');
  var overlay = document.getElementById('mnav-overlay');
  var linksSrc = document.getElementById('mnav-links');
  if (toggle && overlay && linksSrc) {
    overlay.innerHTML = linksSrc.innerHTML;
    toggle.addEventListener('click', function () {
      var open = overlay.classList.toggle('open');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    overlay.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', function () { overlay.classList.remove('open'); });
    });
  }
})();
</script>
