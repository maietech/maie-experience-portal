<!DOCTYPE html>
<html lang="en" data-theme="dark">
<!--
  ╔══════════════════════════════════════════════════════════════════════════╗
  ║  MAIE EXPERIENCE MODULE TEMPLATE  v2.0                                  ║
  ║  ─────────────────────────────────────────────────────────────────────  ║
  ║  CHANGES FROM v1.0                                                       ║
  ║    • Tokens unified with portal (ember red #A52A2A, Bebas Neue, etc.)   ║
  ║    • Pixie engine moved to maie-pixie.js — no duplicate renderer        ║
  ║    • Runs standalone (open this file) OR embedded in the portal         ║
  ║      (set EMBED_MODE = true below, strip html/head/body tags,           ║
  ║       inject the resulting <div> into a portal stub slot)               ║
  ║                                                                          ║
  ║  HOW TO USE                                                              ║
  ║    1. Copy → rename: maie-module-workspace.html etc.                    ║
  ║    2. Fill MODULE_CONFIG (starts ~line 100)                             ║
  ║    3. Optionally define window.renderInteractive(container)             ║
  ║    4. For portal embedding: set EMBED_MODE = true                       ║
  ║                                                                          ║
  ║  SECTIONS (always in this order):                                        ║
  ║    1. Vision   2. Problem   3. Approach   4. Interactive                 ║
  ║    5. Architecture   6. Why it matters   7. Future                       ║
  ╚══════════════════════════════════════════════════════════════════════════╝
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAIE Experience Module</title>

<!-- Fonts — same stack as the portal -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Shared Pixie engine -->
<script src="maie-pixie.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════════
   DESIGN TOKENS — unified with portal (global.css + mu-tokens.css)
   Purple accent (#8b5cf6) is available as --em-accent for module use
   but Bebas Neue + ember red are the primary brand expression.
   ═══════════════════════════════════════════════════════════════════ */
:root {
  /* ── Portal-aligned brand tokens ─────────────────────────────── */
  --primary:          #A52A2A;
  --primary-light:    #C24E4E;
  --primary-dark:     #772E25;
  --primary-glow:     rgba(165,42,42,0.30);
  --accent:           #FFB400;

  /* ── Surfaces ─────────────────────────────────────────────────── */
  --bg:               #09090B;
  --bg-alt:           #0C0D10;
  --surface:          #111318;
  --surface-1:        #13131c;
  --surface-2:        #1a1a26;

  /* ── Borders ──────────────────────────────────────────────────── */
  --border:           rgba(255,255,255,0.07);
  --border-mid:       rgba(255,255,255,0.13);
  --border-brand:     rgba(165,42,42,0.32);

  /* ── Text ─────────────────────────────────────────────────────── */
  --text-1:           rgba(232,230,227,0.94);
  --text-2:           rgba(232,230,227,0.60);
  --text-3:           rgba(232,230,227,0.38);
  --text-4:           rgba(232,230,227,0.22);

  /* ── Fonts — same as portal ───────────────────────────────────── */
  --font-display:     'Bebas Neue', sans-serif;
  --font-ui:          'DM Sans', system-ui, sans-serif;
  --font-mono:        'JetBrains Mono', monospace;

  /* ── Module accent (can be overridden per-module) ─────────────── */
  --em-accent:        #8b5cf6;
  --em-accent-dim:    rgba(139,92,246,0.16);
  --em-accent-glow:   rgba(139,92,246,0.08);

  /* ── Status ───────────────────────────────────────────────────── */
  --ok:           #22c55e;
  --ok-dim:       rgba(34,197,94,0.12);
  --info:         #38bdf8;
  --info-dim:     rgba(56,189,248,0.12);
  --warn:         #f59e0b;
  --warn-dim:     rgba(245,158,11,0.12);
  --danger:       #f43f5e;

  /* ── Geometry ─────────────────────────────────────────────────── */
  --radius:    12px;
  --radius-sm:  8px;
  --gap-xs:     6px;
  --gap-sm:    12px;
  --gap-md:    20px;
  --gap-lg:    32px;
  --gap-xl:    48px;
  --spine-w:    3px;
  --nav-w:    180px;
  --content-max: 820px;
}

/* ── Reset ───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ── Base — only applied in standalone mode ──────────────────────── */
.em-standalone body {
  background:  var(--bg);
  color:       var(--text-1);
  font-family: var(--font-ui);
  font-size:   14px;
  line-height: 1.65;
  min-height:  100vh;
  -webkit-font-smoothing: antialiased;
}

/* When embedded, the portal provides background/color/font. We just
   need the content structure to be clean. */
.em-root {
  color:       var(--text-1);
  font-family: var(--font-ui);
  font-size:   14px;
  line-height: 1.65;
}

/* ═══════════════════════════════════════════════════════════════════
   LAYOUT SHELL
   In standalone mode (.em-standalone): full viewport flex row.
   In embedded mode: the spine is hidden; main fills the portal pane.
   ═══════════════════════════════════════════════════════════════════ */
.em-shell {
  display: flex;
  min-height: 100%;
}

/* ── Left chapter spine ──────────────────────────────────────────── */
.em-spine {
  width:        var(--nav-w);
  flex-shrink:  0;
  position:     sticky;
  top:          0;
  height:       100vh;
  display:      flex;
  flex-direction: column;
  padding:      40px 0 40px 28px;
  border-right: 0.5px solid var(--border);
}

/* Spine hidden when embedded (portal provides chapter navigation) */
.em-root.embedded .em-spine { display: none; }

.em-chapter-id {
  font-family:    var(--font-mono);
  font-size:      10px;
  color:          var(--text-3);
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-bottom:  6px;
}

.em-chapter-name {
  font-family:  var(--font-display);
  font-size:    1.1rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color:        var(--text-2);
  margin-bottom: var(--gap-xl);
  padding-right: 16px;
  line-height:  1.2;
}

/* Section nav pills */
.em-nav { display: flex; flex-direction: column; gap: 2px; }

.em-nav-item {
  display:      flex;
  align-items:  center;
  gap:          10px;
  padding:      6px 0;
  cursor:       pointer;
  text-decoration: none;
  border:       none;
  background:   none;
  font-family:  var(--font-ui);
  text-align:   left;
}

.em-nav-item .em-nav-dot {
  width:         var(--spine-w);
  height:        20px;
  border-radius: 2px;
  background:    var(--border-mid);
  flex-shrink:   0;
  transition:    background .2s, height .2s;
}

.em-nav-item .em-nav-label {
  font-size:      11px;
  color:          var(--text-3);
  transition:     color .2s;
  white-space:    nowrap;
  overflow:       hidden;
  text-overflow:  ellipsis;
  max-width:      130px;
}

.em-nav-item:hover .em-nav-dot  { background: var(--text-3); }
.em-nav-item:hover .em-nav-label { color: var(--text-2); }

.em-nav-item.active .em-nav-dot  { background: var(--primary-light); height: 28px; }
.em-nav-item.active .em-nav-label { color: var(--text-1); font-weight: 500; }

.em-closing-q {
  margin-top:    auto;
  padding-right: 16px;
  font-size:     10px;
  color:         var(--text-3);
  line-height:   1.5;
  font-style:    italic;
  border-top:    0.5px solid var(--border);
  padding-top:   var(--gap-md);
}

/* ── Main content area ───────────────────────────────────────────── */
.em-main {
  flex:       1;
  min-width:  0;
  padding:    var(--gap-xl) var(--gap-xl);
  max-width:  calc(var(--content-max) + var(--gap-xl) * 2);
}

/* ── Section base ────────────────────────────────────────────────── */
.em-section {
  margin-bottom:  var(--gap-xl);
  padding-bottom: var(--gap-xl);
  border-bottom:  0.5px solid var(--border);
}
.em-section:last-child { border-bottom: none; }

/* Section number + label */
.em-sec-meta {
  display:      flex;
  align-items:  center;
  gap:          var(--gap-sm);
  margin-bottom: var(--gap-md);
}

.em-sec-num {
  font-family:    var(--font-mono);
  font-size:      10px;
  color:          var(--primary-light);
  letter-spacing: .12em;
  width:          24px;
  flex-shrink:    0;
}

.em-sec-label {
  font-size:      10px;
  color:          var(--text-3);
  letter-spacing: .12em;
  text-transform: uppercase;
  font-weight:    500;
}

.em-sec-line {
  flex:       1;
  height:     0.5px;
  background: var(--border);
}

/* Section hero title — Bebas Neue for display */
.em-sec-title {
  font-family: var(--font-display);
  font-size:   1.6rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color:       var(--text-1);
  line-height: 1.1;
  margin-bottom: var(--gap-sm);
}

.em-sec-body {
  font-size:  14px;
  color:      var(--text-2);
  line-height: 1.7;
  max-width:  620px;
}

/* ── §1 Vision ───────────────────────────────────────────────────── */
.em-vision-hero {
  border-radius: var(--radius);
  background:    var(--surface-1);
  border:        0.5px solid var(--border);
  padding:       var(--gap-lg);
  margin-top:    var(--gap-md);
  position:      relative;
  overflow:      hidden;
}

.em-vision-hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 80% at 0% 50%,  rgba(165,42,42,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 100% 20%, rgba(255,180,0,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.em-vision-statement {
  font-family: var(--font-display);
  font-size:   1.5rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color:       var(--text-1);
  line-height: 1.15;
  max-width:   560px;
  position:    relative;
  z-index:     1;
}

.em-vision-statement em {
  font-style: normal;
  color:      var(--primary-light);
}

.em-vision-sub {
  font-size:   13px;
  color:       var(--text-2);
  margin-top:  var(--gap-sm);
  line-height: 1.6;
  max-width:   520px;
  position:    relative;
  z-index:     1;
}

/* ── §2 Problem ──────────────────────────────────────────────────── */
.em-problems {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap:        var(--gap-sm);
  margin-top: var(--gap-md);
}

.em-problem-card {
  background:    var(--surface-1);
  border:        0.5px solid var(--border);
  border-radius: var(--radius);
  padding:       var(--gap-md);
  transition:    border-color .15s;
}
.em-problem-card:hover { border-color: var(--border-brand); }

.em-problem-icon  { font-size:20px; margin-bottom:var(--gap-xs); display:block; color:var(--text-2); }
.em-problem-title { font-size:13px; font-weight:500; color:var(--text-1); margin-bottom:4px; }
.em-problem-desc  { font-size:12px; color:var(--text-3); line-height:1.55; }

/* ── §3 Approach ─────────────────────────────────────────────────── */
.em-approach-quote {
  font-family: var(--font-display);
  font-size:   1.15rem;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color:       var(--text-1);
  line-height: 1.4;
  border-left: 2px solid var(--primary);
  padding-left: var(--gap-md);
  margin:      var(--gap-md) 0;
}

.em-approach-pillars {
  display:    flex;
  gap:        var(--gap-sm);
  margin-top: var(--gap-md);
  flex-wrap:  wrap;
}

.em-pillar {
  flex:          1;
  min-width:     160px;
  background:    var(--surface-1);
  border:        0.5px solid var(--border);
  border-radius: var(--radius);
  padding:       var(--gap-md);
  transition:    border-color .15s;
}
.em-pillar:hover { border-color: var(--border-brand); }

.em-pillar-num {
  font-family:    var(--font-mono);
  font-size:      10px;
  color:          var(--primary-light);
  letter-spacing: .1em;
  margin-bottom:  6px;
}
.em-pillar-title { font-size:13px; font-weight:500; color:var(--text-1); margin-bottom:4px; }
.em-pillar-desc  { font-size:12px; color:var(--text-3); line-height:1.55; }

/* ── §4 Interactive ──────────────────────────────────────────────── */
.em-interactive-container {
  margin-top:    var(--gap-md);
  border-radius: var(--radius);
  border:        0.5px solid var(--border);
  background:    var(--surface-1);
  overflow:      hidden;
  min-height:    240px;
}

.em-interactive-label {
  display:      flex;
  align-items:  center;
  gap:          var(--gap-xs);
  padding:      var(--gap-sm) var(--gap-md);
  border-bottom: 0.5px solid var(--border);
  font-family:  var(--font-mono);
  font-size:    11px;
  color:        var(--text-3);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.em-interactive-label::before {
  content: '';
  width:6px; height:6px; border-radius:50%;
  background: var(--ok);
  box-shadow: 0 0 6px var(--ok);
  flex-shrink: 0;
}

.em-interactive-body { padding: var(--gap-md); }

/* Default step-through flow */
.em-flow { display:flex; flex-direction:column; align-items:flex-start; gap:0; }
.em-flow-node { display:flex; align-items:center; gap:var(--gap-md); }

.em-flow-node-box {
  background:    var(--surface-2);
  border:        0.5px solid var(--border-mid);
  border-radius: var(--radius-sm);
  padding:       8px 18px;
  font-size:     12px;
  font-weight:   500;
  color:         var(--text-1);
  white-space:   nowrap;
  cursor:        pointer;
  transition:    border-color .2s, background .2s;
}
.em-flow-node-box:hover,
.em-flow-node-box.active {
  border-color: var(--primary-light);
  background:   rgba(165,42,42,0.12);
}

.em-flow-node-desc { font-size:12px; color:var(--text-3); line-height:1.4; }
.em-flow-arrow { width:0.5px; height:18px; background:var(--border-mid); margin-left:28px; }

/* ── §5 Architecture ─────────────────────────────────────────────── */
.em-arch-layers {
  display:       flex;
  flex-direction: column;
  gap:           2px;
  margin-top:    var(--gap-md);
  border-radius: var(--radius);
  overflow:      hidden;
  border:        0.5px solid var(--border);
}

.em-arch-layer {
  display:      flex;
  align-items:  center;
  gap:          var(--gap-md);
  padding:      var(--gap-sm) var(--gap-md);
  border-bottom: 0.5px solid var(--border);
  background:   var(--surface-1);
  transition:   background .15s;
}
.em-arch-layer:last-child { border-bottom: none; }
.em-arch-layer:hover { background: var(--surface-2); }

.em-arch-layer-num   { font-family:var(--font-mono); font-size:9px; color:var(--text-3); width:20px; flex-shrink:0; }
.em-arch-layer-label { font-size:12px; font-weight:500; color:var(--text-1); min-width:160px; }
.em-arch-layer-desc  { font-size:12px; color:var(--text-3); line-height:1.4; flex:1; }

.em-arch-badge {
  font-size:10px; padding:2px 8px; border-radius:4px;
  font-family:var(--font-mono); flex-shrink:0;
}

/* ── §6 Why it matters ───────────────────────────────────────────── */
.em-outcomes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap:        var(--gap-sm);
  margin-top: var(--gap-md);
}

.em-outcome {
  display:       flex;
  gap:           var(--gap-sm);
  align-items:   flex-start;
  padding:       var(--gap-md);
  border-radius: var(--radius);
  border:        0.5px solid var(--border);
  background:    var(--surface-1);
  transition:    border-color .15s;
}
.em-outcome:hover { border-color: var(--border-brand); }

.em-outcome-bullet { width:6px; height:6px; border-radius:50%; background:var(--primary-light); flex-shrink:0; margin-top:5px; }
.em-outcome-title  { font-size:13px; font-weight:500; color:var(--text-1); margin-bottom:3px; }
.em-outcome-desc   { font-size:12px; color:var(--text-3); line-height:1.5; }

/* ── §7 Future ───────────────────────────────────────────────────── */
.em-future-items {
  display:        flex;
  flex-direction: column;
  gap:            var(--gap-xs);
  margin-top:     var(--gap-md);
}

.em-future-item {
  display:        flex;
  align-items:    baseline;
  gap:            var(--gap-md);
  padding:        var(--gap-sm) 0;
  border-bottom:  0.5px solid var(--border);
}
.em-future-item:last-child { border-bottom: none; }

.em-future-horizon {
  font-family:    var(--font-mono);
  font-size:      10px;
  color:          var(--primary-light);
  letter-spacing: .08em;
  width:          68px;
  flex-shrink:    0;
}

.em-future-title { font-size:13px; font-weight:500; color:var(--text-1); margin-bottom:2px; }
.em-future-desc  { font-size:12px; color:var(--text-3); line-height:1.45; }

/* ── Design principles strip ─────────────────────────────────────── */
.em-principles {
  display:     flex;
  gap:         var(--gap-sm);
  flex-wrap:   wrap;
  padding:     var(--gap-md) 0;
  border-top:  0.5px solid var(--border);
  margin-top:  var(--gap-lg);
}

.em-principle       { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--text-3); }
.em-principle-dot   { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

/* ── Module closing ──────────────────────────────────────────────── */
.em-closing {
  margin-top:    var(--gap-xl);
  padding:       var(--gap-lg);
  border-radius: var(--radius);
  border:        0.5px solid var(--border-brand);
  background:    rgba(165,42,42,0.06);
  text-align:    center;
}

.em-closing-title {
  font-family:    var(--font-mono);
  font-size:      10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color:          var(--text-3);
  margin-bottom:  var(--gap-sm);
}

.em-closing-body {
  font-family: var(--font-display);
  font-size:   1.2rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color:       var(--text-2);
  line-height: 1.45;
  max-width:   520px;
  margin:      0 auto;
}

.em-closing-body em {
  font-style: normal;
  color:      var(--primary-light);
}

/* ── Utility ─────────────────────────────────────────────────────── */
.em-tag {
  display:        inline-block;
  font-family:    var(--font-mono);
  font-size:      10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding:        3px 8px;
  border-radius:  4px;
  font-weight:    500;
  margin-right:   4px;
  margin-bottom:  4px;
}

code {
  font-family:   var(--font-mono);
  font-size:     11px;
  background:    var(--surface-2);
  border:        0.5px solid var(--border);
  border-radius: 4px;
  padding:       1px 5px;
  color:         var(--text-2);
}

/* ── Responsive ──────────────────────────────────────────────────── */
@media (max-width: 680px) {
  .em-spine    { display: none; }
  .em-main     { padding: var(--gap-lg) var(--gap-md); }
  .em-outcomes { grid-template-columns: 1fr; }
  .em-problems { grid-template-columns: 1fr; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
     MODULE CONFIG — Edit everything below until END MODULE_CONFIG.
     Nothing else needs to change for a standard module.
     ═══════════════════════════════════════════════════════════════════ -->
<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  EMBED_MODE                                                  ║
// ║  false → renders standalone with its own <body> background  ║
// ║  true  → assumes portal provides chrome; spine is hidden    ║
// ╚══════════════════════════════════════════════════════════════╝
const EMBED_MODE = false;

// ╔══════════════════════════════════════════════════════════════╗
// ║  START MODULE_CONFIG                                         ║
// ╚══════════════════════════════════════════════════════════════╝
const MODULE_CONFIG = {

  // ── Identity ──────────────────────────────────────────────────
  chapterId:   'CH.05',
  chapterName: 'Living Intelligence',
  moduleTag:   'MAIE · Pixie Companion · Identity Framework',

  // ── Pixie config (optional) ───────────────────────────────────
  // If defined, a live Pixie canvas is injected into Section 4
  // automatically unless renderInteractive() is also defined.
  pixie: {
    theme:  'ember',    // 'ember'|'arctic'|'prism'|'solar'|'forest'|'void'
    rings:  2,
    shape:  'circle',   // 'circle'|'hexagon'|'diamond'|'shield'
    echoes: [
      { color: '#38BDF8', resonance: 0.8, createdAt: Date.now() - 172800000 },
      { color: '#A855F7', resonance: 0.6, createdAt: Date.now() - 2592000000 },
    ],
  },

  // ── Section 1: Vision ─────────────────────────────────────────
  vision: {
    headline: 'Creative work should <em>have a face.</em> Intelligent systems should be <em>felt, not managed.</em>',
    sub: 'MAIE transforms the abstract complexity of multi-agent AI orchestration into a single living presence — one that grows richer the more you create.',
  },

  // ── Section 2: Problem ────────────────────────────────────────
  problemIntro: 'AI tools today are powerful and invisible. They produce output but leave no sense of the process — no context, no personality, no persistent memory of what was built.',
  problems: [
    { icon: '◈', title: 'Invisible orchestration',  desc: 'Dozens of AI agents collaborate behind the scenes, but creators see only a spinning progress bar.' },
    { icon: '◎', title: 'No persistent context',    desc: 'Each session starts from zero. The system has no memory of the work, the creator, or the creative history.' },
    { icon: '◇', title: 'Identity is interchangeable', desc: 'Professional creators have no visual or systemic presence inside the tools they build their careers with.' },
    { icon: '⬡', title: 'Achievements vanish',      desc: 'Creative milestones — publications, collaborations, breakthroughs — disappear into logs with no persistent record.' },
  ],

  // ── Section 3: Approach ───────────────────────────────────────
  approach: {
    quote: 'MAIE introduces the Pixie Companion — a living visualization layer that sits directly above the agent pipeline and reflects the full state of a creator\'s presence on the platform.',
    pillars: [
      { title: 'Workflow mirroring',   desc: 'Every agent phase — planning, approval, execution, completion — drives a corresponding Pixie state in real time.' },
      { title: 'Persistent reputation', desc: 'Achievements and milestones mint permanent echo marks that orbit the Pixie canvas across every session.' },
      { title: 'Personal identity',    desc: 'Archetype, theme, name, and marketplace skins make every Pixie distinct and owned by the creator.' },
    ],
  },

  // ── Section 4: Interactive ────────────────────────────────────
  // Set renderInteractive = null to get the default flow diagram.
  // The Pixie is auto-injected alongside it when pixie config exists.
  interactive: {
    label: 'Live demonstration',
    intro: 'Explore how the Pixie responds to each phase of an agent workflow. Click any stage.',
    flowSteps: [
      { label: 'Planning',   desc: 'Pixie enters attentive state. Energy rises. Particles accelerate.' },
      { label: 'Approval',   desc: 'Pixie holds a calm, present posture. Risk level surfaces for the user.' },
      { label: 'Executing',  desc: 'Progress ring fills. Multiple agents activate in coordinated sequence.' },
      { label: 'Monitoring', desc: 'Steps complete. Output files emerge. Pixie energy holds steady.' },
      { label: 'Completion', desc: 'Pixie celebrates, then rests. Achievement echo joins permanent orbit.' },
    ],
  },

  // ── Section 5: Architecture ───────────────────────────────────
  architecture: {
    intro: 'The Pixie sits at the intersection of identity, persistence, and real-time orchestration. Three independently evolvable layers power the experience.',
    layers: [
      { label: 'Creator',             desc: 'Interacts with one Pixie companion across all MAIE contexts.',              badge: 'User',    badgeColor: 'none'    },
      { label: 'Pixie Canvas',        desc: 'Canvas rendering layer — phase, echoes, skins, and identity glyph.',        badge: 'React',   badgeColor: 'info'    },
      { label: 'PixieAvatarBridge',   desc: 'Translates AgentWorkflowPanel phase events into canvas state.',             badge: 'Hook',    badgeColor: 'accent'  },
      { label: 'Agent Workflow',      desc: 'Plans, approves, executes, and monitors multi-agent pipelines.',             badge: 'FastAPI', badgeColor: 'ok'      },
      { label: 'pixie_companions',    desc: 'Postgres table: archetype, theme, preferences, asset FK.',                   badge: 'DB',      badgeColor: 'warn'    },
      { label: 'Marketplace Assets',  desc: 'AGENT_SKIN, ACHIEVEMENT_ARTIFACT, LEGACY_ECHO asset rows.',                 badge: 'S3+DB',   badgeColor: 'none'    },
    ],
  },

  // ── Section 6: Why it matters ─────────────────────────────────
  outcomes: [
    { title: 'Creator retention',    desc: 'A Pixie that grows richer over time gives creators a reason to return — their identity is on the platform, not just their files.' },
    { title: 'Differentiated UX',    desc: 'No competing platform visualizes AI orchestration as a living companion. This is a category-defining interaction pattern.' },
    { title: 'Marketplace depth',    desc: 'AGENT_SKIN packs, identity themes, and achievement collections create a natural premium layer with high perceived value.' },
    { title: 'Enterprise readiness', desc: 'The three-tier identity architecture separates provenance (immutable) from appearance (customizable) — a defensible data contract.' },
  ],

  // ── Section 7: Future ─────────────────────────────────────────
  future: [
    { horizon: 'Now',    title: 'Core Pixie system',           desc: 'Five archetypes, 13 themes, full preference system, reputation echoes, export, and marketplace skin compositing.' },
    { horizon: 'Near',   title: 'Multi-Pixie collaboration',   desc: 'Team environments where each member\'s Pixie appears in a shared canvas — visible co-presence during collaborative productions.' },
    { horizon: 'Near',   title: 'Adaptive temperament',        desc: 'Pixie personality modulates based on long-term interaction history — an Archivist who has seen 500 productions behaves differently.' },
    { horizon: 'Future', title: 'Pixie as agent interface',    desc: 'Direct goal input through the Pixie itself — removing the workflow panel as an intermediate step for experienced creators.' },
  ],

  // ── Design principles (keep consistent across all modules) ────
  principles: [
    { title: 'Human-Centered AI',      desc: 'AI augments creativity rather than replacing it.',                  color: '#A855F7' },
    { title: 'Transparency',           desc: 'Intelligent systems remain understandable and observable.',          color: '#38BDF8' },
    { title: 'Persistent Identity',    desc: 'Creative work builds lasting context and reputation.',              color: '#22C55E' },
    { title: 'Scalable Collaboration', desc: 'Individuals and teams grow without increasing complexity.',         color: '#FFB400' },
  ],

  closingQuestion: 'How does this strengthen MAIE as the operating system for intelligent media production?',
  closingAnswer:   'The Pixie Companion makes <em>every creator\'s history visible</em> and <em>every agent action legible</em> — turning MAIE from a tool into a platform that creators build their identity on.',

};

</script>

</script>

<div class="em-root" id="em-root">
<div class="em-shell">

  <!-- Left spine (hidden in embedded mode) -->
  <nav class="em-spine" aria-label="Module sections">
    <div class="em-chapter-id"   id="spine-chapter-id"></div>
    <div class="em-chapter-name" id="spine-chapter-name"></div>
    <div class="em-nav"          id="spine-nav" role="list"></div>
    <div class="em-closing-q"    id="spine-closing-q"></div>
  </nav>

  <!-- Main content -->
  <main class="em-main" id="em-main">
    <div id="em-sections"></div>
    <div class="em-principles" id="em-principles" role="list" aria-label="Design principles"></div>
    <div class="em-closing" id="em-closing">
      <div class="em-closing-title">Platform question</div>
      <div class="em-closing-body" id="em-closing-body"></div>
    </div>
  </main>

</div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════
     TEMPLATE RENDERER
     ═══════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  const C = MODULE_CONFIG;

  /* ── Embed / standalone mode ─────────────────────────────────── */
  const root = document.getElementById('em-root');
  if (EMBED_MODE) {
    root.classList.add('embedded');
  } else {
    document.body.style.cssText = 'background:var(--bg);min-height:100vh;';
  }

  /* ── Badge colour map (unified with portal) ──────────────────── */
  const BADGE = {
    accent: { bg:'rgba(139,92,246,.15)',  border:'rgba(139,92,246,.4)',  text:'#a78bfa' },
    ok:     { bg:'rgba(34,197,94,.12)',   border:'rgba(34,197,94,.35)',  text:'#4ade80' },
    info:   { bg:'rgba(56,189,248,.12)',  border:'rgba(56,189,248,.35)', text:'#7dd3fc' },
    warn:   { bg:'rgba(245,158,11,.12)',  border:'rgba(245,158,11,.35)', text:'#fbbf24' },
    none:   { bg:'rgba(255,255,255,.05)', border:'rgba(255,255,255,.1)', text:'#9994b8' },
  };

  function badge(text, key) {
    const c = BADGE[key] || BADGE.none;
    return `<span class="em-tag em-arch-badge"
      style="background:${c.bg};border:0.5px solid ${c.border};color:${c.text};"
    >${text}</span>`;
  }

  function el(tag, attrs, html) {
    const e = document.createElement(tag);
    Object.entries(attrs || {}).forEach(([k,v]) => {
      if (k === 'class') e.className = v; else e.setAttribute(k, v);
    });
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function secHeader(num, label) {
    return `<div class="em-sec-meta">
      <span class="em-sec-num">${num}</span>
      <span class="em-sec-label">${label}</span>
      <div class="em-sec-line"></div>
    </div>`;
  }

  /* ── Spine ───────────────────────────────────────────────────── */
  document.getElementById('spine-chapter-id').textContent   = C.chapterId;
  document.getElementById('spine-chapter-name').textContent = C.chapterName;
  document.getElementById('spine-closing-q').textContent    = C.closingQuestion;

  const SECTIONS = [
    { id:'s1', label:'Vision' }, { id:'s2', label:'Problem' },
    { id:'s3', label:'Approach' }, { id:'s4', label:'Interactive' },
    { id:'s5', label:'Architecture' }, { id:'s6', label:'Why it matters' },
    { id:'s7', label:'Future' },
  ];
  const spineNav = document.getElementById('spine-nav');
  SECTIONS.forEach(sec => {
    const item = el('a', { class:'em-nav-item', href:'#'+sec.id, role:'listitem', 'aria-label':sec.label });
    item.innerHTML = `<div class="em-nav-dot"></div><span class="em-nav-label">${sec.label}</span>`;
    spineNav.appendChild(item);
  });

  /* ── §1 Vision ───────────────────────────────────────────────── */
  const container = document.getElementById('em-sections');
  const s1 = el('section', { class:'em-section', id:'s1' });
  s1.innerHTML = `${secHeader('01','Vision')}
    <div class="em-vision-hero">
      <div class="em-vision-statement">${C.vision.headline}</div>
      <div class="em-vision-sub">${C.vision.sub}</div>
    </div>`;
  container.appendChild(s1);

  /* ── §2 Problem ──────────────────────────────────────────────── */
  const s2 = el('section', { class:'em-section', id:'s2' });
  s2.innerHTML = `${secHeader('02','The problem')}
    <p class="em-sec-body">${C.problemIntro}</p>
    <div class="em-problems">
      ${C.problems.map(p=>`
        <div class="em-problem-card">
          <span class="em-problem-icon">${p.icon}</span>
          <div class="em-problem-title">${p.title}</div>
          <div class="em-problem-desc">${p.desc}</div>
        </div>`).join('')}
    </div>`;
  container.appendChild(s2);

  /* ── §3 Approach ─────────────────────────────────────────────── */
  const s3 = el('section', { class:'em-section', id:'s3' });
  s3.innerHTML = `${secHeader('03','The MAIE approach')}
    <blockquote class="em-approach-quote">${C.approach.quote}</blockquote>
    <div class="em-approach-pillars">
      ${C.approach.pillars.map((p,i)=>`
        <div class="em-pillar">
          <div class="em-pillar-num">${String(i+1).padStart(2,'0')}</div>
          <div class="em-pillar-title">${p.title}</div>
          <div class="em-pillar-desc">${p.desc}</div>
        </div>`).join('')}
    </div>`;
  container.appendChild(s3);

  /* ── §4 Interactive ──────────────────────────────────────────── */
  const s4 = el('section', { class:'em-section', id:'s4' });
  s4.innerHTML = `${secHeader('04','Interactive experience')}
    <p class="em-sec-body" style="margin-bottom:12px;">${C.interactive.intro}</p>
    <div class="em-interactive-container">
      <div class="em-interactive-label">${C.interactive.label}</div>
      <div class="em-interactive-body" id="interactive-body"></div>
    </div>`;
  container.appendChild(s4);

  const interBody = document.getElementById('interactive-body');

  // Pixie companion (uses shared MAIE.makePixie if script loaded)
  let modulePix = null;
  if (C.pixie && typeof MAIE !== 'undefined') {
    const pixWrap = document.createElement('div');
    pixWrap.style.cssText = 'display:flex;gap:16px;align-items:flex-start;';
    const pixCol = document.createElement('div');
    pixCol.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:6px;';
    const cv = document.createElement('canvas');
    cv.id = 'module-pixie'; cv.width = 120; cv.height = 120;
    cv.setAttribute('aria-label','Pixie companion for this module');
    const phLabel = document.createElement('div');
    phLabel.style.cssText = 'font-family:var(--font-mono);font-size:10px;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;';
    phLabel.textContent = 'idle';
    pixCol.appendChild(cv); pixCol.appendChild(phLabel);

    const contentCol = document.createElement('div');
    contentCol.style.cssText = 'flex:1;';
    contentCol.id = 'interactive-content';
    pixWrap.appendChild(pixCol); pixWrap.appendChild(contentCol);
    interBody.appendChild(pixWrap);

    modulePix = MAIE.makePixie('module-pixie', C.pixie.theme || 'ember', {
      rings:  C.pixie.rings  || 2,
      shape:  C.pixie.shape  || 'circle',
      echoes: C.pixie.echoes || [],
    });

    // Wire flow steps to Pixie phase
    const PHASE_MAP = {
      'Planning': 'planning', 'Approval': 'review',
      'Executing': 'executing', 'Monitoring': 'executing', 'Completion': 'completed',
    };

    if (typeof window.renderInteractive === 'function') {
      window.renderInteractive(contentCol);
    } else {
      buildStepFlow(contentCol, phLabel, modulePix, PHASE_MAP);
    }
  } else if (typeof window.renderInteractive === 'function') {
    window.renderInteractive(interBody);
  } else {
    buildStepFlow(interBody, null, null, {});
  }

  function buildStepFlow(target, phLabel, pixie, phaseMap) {
    const steps = C.interactive.flowSteps || [];
    let activeIdx = 0;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;gap:16px;align-items:flex-start;';
    const flowEl = document.createElement('div'); flowEl.className = 'em-flow';
    const detailEl = document.createElement('div');
    detailEl.style.cssText = 'flex:1;padding:12px 16px;border-radius:10px;border:0.5px solid var(--border);background:var(--surface-2);min-height:80px;';

    function buildFlow() {
      flowEl.innerHTML = '';
      steps.forEach((step, i) => {
        const row = document.createElement('div'); row.className = 'em-flow-node';
        const box = document.createElement('div'); box.className = 'em-flow-node-box';
        box.textContent = step.label;
        if (i === activeIdx) box.classList.add('active');
        box.addEventListener('click', () => {
          activeIdx = i;
          buildFlow(); updateDetail();
          if (pixie && phaseMap[step.label]) {
            pixie.setPhase(phaseMap[step.label]);
            pixie.setProgress(step.label === 'Executing' ? 65 : step.label === 'Completion' ? 100 : 0);
          }
          if (phLabel) phLabel.textContent = (phaseMap[step.label] || 'idle');
        });
        row.appendChild(box); flowEl.appendChild(row);
        if (i < steps.length-1) {
          const arr = document.createElement('div'); arr.className = 'em-flow-arrow'; flowEl.appendChild(arr);
        }
      });
    }

    function updateDetail() {
      const s = steps[activeIdx];
      detailEl.innerHTML = `<div style="font-size:12px;font-weight:500;color:var(--text-1);margin-bottom:6px;">${s.label}</div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.6;">${s.desc}</div>`;
    }

    buildFlow(); updateDetail();
    wrap.appendChild(flowEl); wrap.appendChild(detailEl);
    target.appendChild(wrap);
  }

  /* ── §5 Architecture ─────────────────────────────────────────── */
  const s5 = el('section', { class:'em-section', id:'s5' });
  s5.innerHTML = `${secHeader('05','Architecture simplified')}
    <p class="em-sec-body">${C.architecture.intro}</p>
    <div class="em-arch-layers">
      ${C.architecture.layers.map((l,i)=>`
        <div class="em-arch-layer">
          <span class="em-arch-layer-num">${String(i+1).padStart(2,'0')}</span>
          <span class="em-arch-layer-label">${l.label}</span>
          <span class="em-arch-layer-desc">${l.desc}</span>
          ${l.badge ? badge(l.badge, l.badgeColor||'none') : ''}
        </div>`).join('')}
    </div>`;
  container.appendChild(s5);

  /* ── §6 Why it matters ───────────────────────────────────────── */
  const s6 = el('section', { class:'em-section', id:'s6' });
  s6.innerHTML = `${secHeader('06','Why it matters')}
    <div class="em-outcomes">
      ${C.outcomes.map(o=>`
        <div class="em-outcome">
          <div class="em-outcome-bullet"></div>
          <div>
            <div class="em-outcome-title">${o.title}</div>
            <div class="em-outcome-desc">${o.desc}</div>
          </div>
        </div>`).join('')}
    </div>`;
  container.appendChild(s6);

  /* ── §7 Future ───────────────────────────────────────────────── */
  const s7 = el('section', { class:'em-section', id:'s7' });
  s7.innerHTML = `${secHeader('07','Future evolution')}
    <div class="em-future-items">
      ${C.future.map(f=>`
        <div class="em-future-item">
          <span class="em-future-horizon">${f.horizon}</span>
          <div>
            <div class="em-future-title">${f.title}</div>
            <div class="em-future-desc">${f.desc}</div>
          </div>
        </div>`).join('')}
    </div>`;
  container.appendChild(s7);

  /* ── Principles ──────────────────────────────────────────────── */
  const principlesEl = document.getElementById('em-principles');
  C.principles.forEach(p => {
    const item = el('div', { class:'em-principle', role:'listitem', 'aria-label': p.title+': '+p.desc });
    item.innerHTML = `<div class="em-principle-dot" style="background:${p.color};"></div><span title="${p.desc}">${p.title}</span>`;
    principlesEl.appendChild(item);
  });

  /* ── Closing ─────────────────────────────────────────────────── */
  document.getElementById('em-closing-body').innerHTML = C.closingAnswer;
  document.title = `${C.chapterId} · ${C.chapterName} — MAIE`;

  /* ── Intersection observer for spine nav ─────────────────────── */
  const navItems = document.querySelectorAll('.em-nav-item');
  const sectionEls = document.querySelectorAll('.em-section');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        navItems.forEach(n => n.classList.toggle('active', n.getAttribute('href') === '#'+id));
      }
    });
  }, { threshold: 0.35 });
  sectionEls.forEach(s => observer.observe(s));

})();
</script>
